{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">

    <div class="card shadow-sm p-4">
      <h3 class="text-center mb-4">Add New Job</h3>

      <form method="POST">
        
        <div class="mb-3">
          <label class="form-label">Job Title</label>
          <input name="title" required class="form-control" placeholder="Enter job title">
        </div>

        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="description" required class="form-control" rows="3" placeholder="Enter job description"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label">Company Name</label>
          <input name="company" class="form-control" placeholder="Enter company name">
        </div>

        <div class="d-grid">
          <button class="btn btn-primary">Add Job</button>
        </div>

      </form>

      <div class="text-center mt-3">
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary btn-sm">
          ← Back to Dashboard
        </a>
      </div>

    </div>

  </div>
</div>

{% endblock %}
